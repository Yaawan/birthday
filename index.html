<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>生日快乐 ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;background:#1a1128;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:"Microsoft YaHei",sans-serif}
.text{color:#fff;font-size:36px;text-align:center;z-index:100;text-shadow:0 0 15px #ff5e7d;white-space:nowrap;overflow:hidden;border-right:3px solid #ff5e7d;animation: typing 4s steps(20, end), blink-caret .75s step-end infinite}
.heart{position:absolute;background:#ff5e7d;transform:rotate(-45deg);animation:fly 4s linear infinite}
.heart::before,.heart::after{content:'';width:100%;height:100%;background:inherit;border-radius:50%;position:absolute}
.heart::before{top:-50%}
.heart::after{right:-50%}
@keyframes fly{0%{opacity:1;transform:rotate(-45deg) translateY(0)}100%{opacity:0;transform:rotate(-45deg) translateY(-120vh)}}
@keyframes typing {from {width: 0}to {width: 100%}}
@keyframes blink-caret {from, to {border-color: transparent}50% {border-color: #ff5e7d}}
</style>
</head>
<body>
<!-- 背景音乐，自动播放 -->
<audio autoplay loop>
  <source src="https://music.163.com/song/media/outer/url?id=1868563576.mp3" type="audio/mpeg">


<div class="text">亲爱的，生日快乐！🎂</div>

<script>
alert('生日快乐呀！愿你永远被爱包围～');
function makeHeart(){
  const h=document.createElement('div');
  h.classList.add('heart');
  const s=Math.random()*15+10;
  h.style.width=h.style.height=s+'px';
  h.style.left=Math.random()*window.innerWidth+'px';
  h.style.animationDelay=Math.random()*4+'s';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
}
setInterval(makeHeart,120);
</script>
</body>
</html>
